<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="白蝦驗貨">
<meta name="theme-color" content="#ffffff">
<title>白蝦驗貨表</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--blue:#185FA5;--blue-light:#E6F1FB;--blue-mid:#378ADD;--amber:#854F0B;--amber-light:#FAEEDA;--green:#3B6D11;--green-light:#EAF3DE;--red:#A32D2D;--border:#e0ddd6;--bg:#f7f5f0;--card:#fff;--text:#1a1a1a;--muted:#6b6860;--radius:12px;--radius-sm:8px}
body{font-family:-apple-system,'Hiragino Sans','PingFang TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
.topbar{background:#fff;border-bottom:0.5px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:8px}
.topbar-left .title{font-size:16px;font-weight:600;display:flex;align-items:center;gap:6px}
.topbar-left .sub{font-size:11px;color:var(--muted);margin-top:1px}
.type-badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500}
.badge-raw{background:var(--blue-light);color:#0C447C;border:0.5px solid #85B7EB}
.badge-cooked{background:var(--amber-light);color:var(--amber);border:0.5px solid #EF9F27}
.save-pill{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;font-size:11px;font-weight:500;border:0.5px solid;cursor:pointer;white-space:nowrap;flex-shrink:0}
.saved{background:var(--green-light);color:var(--green);border-color:#97C459}
.unsaved{background:var(--amber-light);color:var(--amber);border-color:#EF9F27}
.saving{background:var(--blue-light);color:var(--blue);border-color:#85B7EB}
.batch-row{display:flex;align-items:center;gap:6px;padding:8px 14px;background:#f0ede8;border-bottom:0.5px solid var(--border)}
.batch-row select{flex:1;font-size:13px;padding:6px 8px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:#fff;color:var(--text)}
.batch-row button{padding:6px 12px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:#fff;font-size:12px;color:var(--text);cursor:pointer;white-space:nowrap}
.btn-danger{color:var(--red)!important;border-color:#F09595!important}
.tabs{display:flex;background:#fff;border-bottom:0.5px solid var(--border);overflow-x:auto;padding:0 8px;gap:2px;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 12px;font-size:12px;color:var(--muted);border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2.5px solid transparent;flex-shrink:0}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.section{display:none;padding:12px 14px;flex-direction:column;gap:10px}
.section.active{display:flex}
.card{background:var(--card);border-radius:var(--radius);border:0.5px solid var(--border);padding:14px}
.card-title{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:.06em}
.field{margin-bottom:12px}
.field:last-child{margin-bottom:0}
.lbl{font-size:13px;color:var(--muted);margin-bottom:5px;display:block}
.req{color:var(--red)}
input[type=text],input[type=date],input[type=number],textarea,select{width:100%;padding:9px 12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:#fff;color:var(--text);font-family:inherit;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--blue-mid)}
textarea{resize:vertical;min-height:60px}
.rg{display:flex;flex-wrap:wrap;gap:6px}
.rb{padding:7px 14px;border:0.5px solid var(--border);border-radius:20px;font-size:13px;cursor:pointer;background:#fff;color:var(--text);font-family:inherit}
.rb.active{background:var(--blue);border-color:var(--blue);color:#fff}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ci{display:flex;align-items:center;gap:8px;padding:9px 11px;border:0.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--text);background:#fff}
.ci input[type=checkbox]{width:17px;height:17px;accent-color:var(--blue);flex-shrink:0}
.ci.on{background:var(--blue-light);border-color:var(--blue-mid);color:#0C447C;font-weight:500}
.wr{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-box{background:#f7f5f0;border-radius:var(--radius-sm);padding:10px;text-align:center;border:0.5px solid var(--border)}
.stat-box .sl{font-size:11px;color:var(--muted);margin-bottom:3px}
.stat-box .sv{font-size:18px;font-weight:600;color:var(--text)}
.stat-box.hi .sv{color:var(--blue)}
.pass{color:var(--green)}.fail{color:var(--red)}
.slider-row{display:flex;align-items:center;gap:10px}
.slider-row input[type=range]{flex:1;accent-color:var(--blue)}
.slider-val{font-size:15px;font-weight:600;min-width:28px;text-align:right;color:var(--text)}
.slider-labs{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:3px}
.type-selector{display:flex;gap:10px}
.type-card{flex:1;border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 10px;text-align:center;cursor:pointer;background:#fff}
.type-card.sel-raw{border-color:var(--blue);background:var(--blue-light)}
.type-card.sel-cooked{border-color:#854F0B;background:var(--amber-light)}
.type-card .ti{font-size:30px;margin-bottom:6px;display:block}
.type-card .tn{font-size:14px;font-weight:600}
.type-card .ts{font-size:11px;color:var(--muted);margin-top:3px}
.type-card.sel-raw .tn{color:var(--blue)}
.type-card.sel-cooked .tn{color:var(--amber)}
.photo-area{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pslot{border:0.5px dashed var(--border);border-radius:var(--radius-sm);aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;background:#f7f5f0}
.pslot img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.pslot .pl{font-size:10px;color:var(--muted);margin-top:3px;z-index:1;text-align:center}
.pslot .pi{font-size:22px;color:var(--muted);z-index:1}
.del-btn{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.6);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;z-index:2;border:none;cursor:pointer;color:#fff;font-size:13px;line-height:1}
input[type=file]{display:none}
.info-note{font-size:12px;color:#0C447C;padding:9px 12px;background:var(--blue-light);border-radius:var(--radius-sm);border-left:3px solid var(--blue)}
.info-note.warn{color:var(--amber);background:var(--amber-light);border-left-color:#EF9F27}
.sh{display:flex;align-items:center;gap:8px;margin-bottom:11px}
.sh-badge{width:22px;height:22px;border-radius:50%;background:var(--blue-light);color:var(--blue);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sh-title{font-size:14px;font-weight:600;color:var(--text)}
.photo-count{font-size:11px;color:var(--muted);margin-left:auto;background:#f0ede8;padding:2px 8px;border-radius:20px}
.bottom-bar{background:#fff;border-top:0.5px solid var(--border);padding:12px 16px;display:flex;gap:8px;position:fixed;bottom:0;left:0;right:0;z-index:100}
.btn-p{flex:1;background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-s{flex:1;background:#fff;color:var(--text);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:13px;font-size:14px;cursor:pointer;font-family:inherit}
.restore-bar{background:var(--amber-light);color:var(--amber);font-size:13px;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:0.5px solid #EF9F27}
.restore-bar button{background:var(--amber);color:#fff;border:none;border-radius:var(--radius-sm);padding:6px 14px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end}
.modal{background:#fff;border-radius:var(--radius) var(--radius) 0 0;padding:20px 16px 36px;width:100%;max-width:480px;margin:0 auto}
.modal h3{font-size:16px;font-weight:600;margin-bottom:6px}
.modal p{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.5}
.export-opt{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.export-btn{padding:13px 14px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;border:0.5px solid var(--border);background:#fff;color:var(--text);text-align:left;display:flex;align-items:center;gap:12px}
.export-btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.export-btn .eb-icon{font-size:22px;flex-shrink:0}
.export-btn .eb-title{font-size:14px;font-weight:600}
.export-btn .eb-sub{font-size:11px;opacity:.72;margin-top:2px}
.prog-wrap{background:#f0ede8;border-radius:20px;height:8px;margin:12px 0 4px;overflow:hidden}
.prog-bar{height:8px;border-radius:20px;background:var(--blue);transition:width .3s}
#prog-text{font-size:12px;color:var(--muted);text-align:center}
</style>
</head>
<body>

<div id="restore-bar" class="restore-bar" style="display:none">
  <span>📋 偵測到上次未完成的驗貨資料</span>
  <button onclick="restoreData()">恢復資料</button>
</div>

<div class="topbar">
  <div class="topbar-left">
    <div class="title">🦐 白蝦驗貨表 <span id="type-badge" class="type-badge badge-raw">生白蝦</span></div>
    <div class="sub" id="batch-label">批次 1 / 共 1 批</div>
  </div>
  <div id="save-pill" class="save-pill saved" onclick="manualSave()">💾 <span id="save-text">已儲存</span></div>
</div>

<div class="batch-row">
  <select id="batch-select" onchange="switchBatch(this.value)"></select>
  <button onclick="addBatch()">＋ 批次</button>
  <button class="btn-danger" onclick="clearAll()">🗑</button>
</div>

<div class="tabs" id="tabs"></div>
<div id="sections"></div>

<div class="bottom-bar">
  <button class="btn-s" onclick="prevTab()">← 上一步</button>
  <button class="btn-p" id="btn-next" onclick="nextTab()">下一步 →</button>
</div>

<!-- Export Modal -->
<div class="modal-bg" id="export-modal" style="display:none" onclick="closeModal(event)">
  <div class="modal">
    <h3>📊 匯出驗貨報告</h3>
    <p>資料為橫版格式（第一行大分類、第二行欄位名），照片依步驟分獨立工作表。</p>
    <div class="export-opt">
      <button class="export-btn primary" onclick="doExport(true)">
        <span class="eb-icon">📋</span>
        <div><div class="eb-title">完整報告（含照片）</div><div class="eb-sub">照片自動縮小，各步驟獨立工作表</div></div>
      </button>
      <button class="export-btn" onclick="doExport(false)">
        <span class="eb-icon">📄</span>
        <div><div class="eb-title">僅資料（不含照片）</div><div class="eb-sub">速度快，檔案小</div></div>
      </button>
    </div>
    <div id="prog-wrap" style="display:none">
      <div class="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
      <div id="prog-text">準備中...</div>
    </div>
    <button class="btn-s" style="width:100%;margin-top:8px" onclick="closeModal()">取消</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<script>
const SK='shrimp_v3';
let batches=[],cur=0,curTab=0,saveTimer=null;

function mkData(){return{type:'raw',brand:'',po:'',date:new Date().toISOString().slice(0,10),spec:'',inspector:'',result:'合格',remark:'',pkg_material:'正常',pkg_print:'正常',pkg_color:'一致',pkg_waterproof:'完整',label_note:'',label_content:false,label_format:false,label_fontsize:false,label_law:false,ice:'正常',frozen_color_note:'',frozen_color_val:27,frozen_size:'正常',frozen_note:'',color_blue:false,color_green:false,color_brown:false,color_yellow:false,smell_none:false,smell_sea:false,smell_fishy:false,smell_ink:false,defect_frostbite:false,defect_blackhead:false,defect_redhead:false,defect_blackleg:false,defect_wsd:false,thawed_color_val:27,thawed_color_note:'',thawed_note:'',arrange:'',th_color_blue:false,th_color_green:false,th_color_brown:false,th_color_yellow:false,th_smell_none:false,th_smell_sea:false,th_smell_fishy:false,th_smell_ink:false,th_defect_frostbite:false,th_defect_blackhead:false,th_defect_redhead:false,th_defect_blackleg:false,th_defect_wsd:false,w_gross:'',w_withice:'',w_pkg:'',w_net:'',w_labeled:'',ratio_group:'三大三小',ratio_big:[],ratio_small:[],cooked_color_val:27,cooked_color_note:'',taste_smell:'正常',taste_sweet:3,taste_shrimp_flavor:3,taste_texture_score:3,vein_shrimp:false,vein_sand:false,vein_level:'無',taste_note:'',photos:{pkg:[],frozen:[],weight:[],thawed:[],cooked:[]}};}

function d(){return batches[cur].data;}
function isC(){return d().type==='cooked';}
function sf(k,v){d()[k]=v;markDirty();}

function markDirty(){
  const p=document.getElementById('save-pill'),t=document.getElementById('save-text');
  p.className='save-pill unsaved';t.textContent='未儲存';
  clearTimeout(saveTimer);saveTimer=setTimeout(autoSave,2000);
}
function autoSave(){
  try{
    const slim=batches.map(b=>({...b,data:{...b.data,photos:{pkg:[],frozen:[],weight:[],thawed:[],cooked:[]}}}));
    localStorage.setItem(SK+'_m',JSON.stringify({batches:slim,cur}));
    batches.forEach((b,i)=>{try{localStorage.setItem(SK+'_p'+i,JSON.stringify(b.data.photos));}catch(e){}});
    const p=document.getElementById('save-pill'),t=document.getElementById('save-text');
    p.className='save-pill saved';t.textContent='已儲存 '+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
  }catch(e){document.getElementById('save-pill').className='save-pill unsaved';document.getElementById('save-text').textContent='儲存失敗';}
}
function manualSave(){
  document.getElementById('save-pill').className='save-pill saving';
  document.getElementById('save-text').textContent='儲存中...';
  setTimeout(autoSave,300);
}
function tryLoadSaved(){
  try{const r=localStorage.getItem(SK+'_m');if(!r)return false;const p=JSON.parse(r);if(p&&p.batches&&p.batches.length){document.getElementById('restore-bar').style.display='flex';return true;}}catch(e){}return false;
}
function restoreData(){
  try{
    const p=JSON.parse(localStorage.getItem(SK+'_m'));
    batches=p.batches;cur=p.cur||0;
    batches.forEach((b,i)=>{try{const ph=localStorage.getItem(SK+'_p'+i);if(ph)b.data.photos=JSON.parse(ph);}catch(e){b.data.photos={pkg:[],frozen:[],weight:[],thawed:[],cooked:[]};} });
    document.getElementById('restore-bar').style.display='none';
    rebuildBatchSelect();renderAll();
  }catch(e){alert('無法恢復');}
}
function clearAll(){
  if(!confirm('確定清除所有資料？'))return;
  try{Object.keys(localStorage).filter(k=>k.startsWith(SK)).forEach(k=>localStorage.removeItem(k));}catch(e){}
  batches=[{id:0,data:mkData()}];cur=0;curTab=0;rebuildBatchSelect();renderAll();
}

function sr(k,v,el){d()[k]=v;markDirty();const rg=el.closest('.rg');if(rg)rg.querySelectorAll('.rb').forEach(b=>b.classList.remove('active'));el.classList.add('active');}
function tc(el,k){const cb=el.querySelector('input');el.classList.toggle('on',cb.checked);d()[k]=cb.checked;markDirty();}
function selectType(t){if(d().type===t)return;if((d().brand||d().po)&&!confirm('切換蝦種類型？'))return;d().type=t;markDirty();updateTypeBadge();curTab=0;renderAll();}
function updateTypeBadge(){const b=document.getElementById('type-badge');b.className='type-badge '+(isC()?'badge-cooked':'badge-raw');b.textContent=isC()?'熟白蝦':'生白蝦';}
function getTabDefs(){return[{lbl:'基本'},{lbl:'包材'},{lbl:'冷凍狀態'},{lbl:'測重'},{lbl:'解凍後'},{lbl:'參差比'},{lbl:isC()?'試吃':'水煮試吃'},{lbl:'照片'}];}

function renderAll(){
  updateTypeBadge();
  document.getElementById('tabs').innerHTML=getTabDefs().map((t,i)=>`<button class="tab${i===curTab?' active':''}" onclick="switchTab(${i},this)">${t.lbl}</button>`).join('');
  buildSections();updateBottomBtn();
}
function buildSections(){
  const c=isC();
  document.getElementById('sections').innerHTML=[
    buildBasic(),buildPkg(),buildFrozen(c),buildWeight(),buildThawed(c),buildRatio(),buildTaste(c),buildPhotos(c)
  ].map((h,i)=>`<div class="section${i===curTab?' active':''}" id="tab-${i}">${h}</div>`).join('');
  loadState();
}

function buildBasic(){return`<div class="card"><div class="card-title">蝦種類型</div><div class="type-selector"><div class="type-card${!isC()?' sel-raw':''}" id="tc-raw" onclick="selectType('raw')"><span class="ti">🦐</span><div class="tn">生白蝦</div><div class="ts">需水煮試吃</div></div><div class="type-card${isC()?' sel-cooked':''}" id="tc-cooked" onclick="selectType('cooked')"><span class="ti">🍤</span><div class="tn">熟白蝦</div><div class="ts">直接試吃</div></div></div></div><div class="card"><div class="card-title">基本資訊</div><div class="field"><label class="lbl">品牌名稱 <span class="req">*</span></label><input type="text" id="f-brand" placeholder="輸入品牌名稱" oninput="sf('brand',this.value)"></div><div class="field"><label class="lbl">採購單號</label><input type="text" id="f-po" placeholder="PO-2024-001" oninput="sf('po',this.value)"></div><div class="field"><label class="lbl">檢驗日期</label><input type="date" id="f-date" oninput="sf('date',this.value)"></div><div class="field"><label class="lbl">規格</label><input type="text" id="f-spec" placeholder="21/25、26/30" oninput="sf('spec',this.value)"></div><div class="field"><label class="lbl">驗貨人員</label><input type="text" id="f-inspector" placeholder="姓名" oninput="sf('inspector',this.value)"></div></div><div class="card"><div class="card-title">整體結論</div><div class="field"><label class="lbl">驗貨結果</label><div class="rg" id="rg-result"><div class="rb" onclick="sr('result','合格',this)">合格</div><div class="rb" onclick="sr('result','條件接受',this)">條件接受</div><div class="rb" onclick="sr('result','不合格',this)">不合格</div></div></div><div class="field"><label class="lbl">備註</label><textarea id="f-remark" placeholder="整體備註..." oninput="sf('remark',this.value)"></textarea></div></div>`;}

function buildPkg(){return`<div class="card"><div class="card-title">包材品質</div><div class="field"><label class="lbl">材質</label><div class="rg" id="rg-pkg-material"><div class="rb" onclick="sr('pkg_material','正常',this)">正常</div><div class="rb" onclick="sr('pkg_material','輕微瑕疵',this)">輕微瑕疵</div><div class="rb" onclick="sr('pkg_material','異常',this)">異常</div></div></div><div class="field"><label class="lbl">印刷品質</label><div class="rg" id="rg-pkg-print"><div class="rb" onclick="sr('pkg_print','正常',this)">正常</div><div class="rb" onclick="sr('pkg_print','偏色',this)">偏色</div><div class="rb" onclick="sr('pkg_print','模糊',this)">模糊</div><div class="rb" onclick="sr('pkg_print','異常',this)">異常</div></div></div><div class="field"><label class="lbl">顏色一致性</label><div class="rg" id="rg-pkg-color"><div class="rb" onclick="sr('pkg_color','一致',this)">一致</div><div class="rb" onclick="sr('pkg_color','輕微差異',this)">輕微差異</div><div class="rb" onclick="sr('pkg_color','差異明顯',this)">差異明顯</div></div></div><div class="field"><label class="lbl">防水層</label><div class="rg" id="rg-pkg-waterproof"><div class="rb" onclick="sr('pkg_waterproof','完整',this)">完整</div><div class="rb" onclick="sr('pkg_waterproof','部分缺損',this)">部分缺損</div><div class="rb" onclick="sr('pkg_waterproof','缺損',this)">缺損</div></div></div></div><div class="card"><div class="card-title">中文標籤</div><div class="cg"><label class="ci" onclick="tc(this,'label_content')"><input type="checkbox">內容正確</label><label class="ci" onclick="tc(this,'label_format')"><input type="checkbox">格式正確</label><label class="ci" onclick="tc(this,'label_fontsize')"><input type="checkbox">字體大小</label><label class="ci" onclick="tc(this,'label_law')"><input type="checkbox">符合法規</label></div><div class="field" style="margin-top:10px"><label class="lbl">標籤備註</label><textarea id="f-label-note" placeholder="標籤問題..." oninput="sf('label_note',this.value)"></textarea></div></div>`;}

span class="slider-val" id="rv-shrimp-flavor">3</span></div><div class="slider-labs"><span>味道淡</span><span>普通</span><span>風味濃</span></div></div><div class="field"><label class="lbl">咬感（1–5）</label><div class="slider-row"><span style="font-size:12px;color:var(--muted)">1</span><input type="range" min="1" max="5" value="3" id="r-texture" oninput="document.getElementById('rv-texture').textContent=this.value;sf('taste_texture_score',+this.value)"><span class="slider-val" id="rv-texture">3</span></div><div class="slider-labs"><span>偏軟</span><span>普通</span><span>Q彈</span></div></div><div class="field"><label class="lbl">蝦腸 / 沙腸</label><div class="cg" style="margin-bottom:8px"><label class="ci" onclick="tc(this,'vein_shrimp')"><input type="checkbox">蝦腸</label><label class="ci" onclick="tc(this,'vein_sand')"><input type="checkbox">沙腸</label></div><div class="rg" id="rg-vein-level"><div class="rb" onclick="sr('vein_level','無',this)">無</div><div class="rb" onclick="sr('vein_level','輕微',this)">輕微</div><div class="rb" onclick="sr('vein_level','明顯',this)">明顯</div></div></div><div class="field"><label class="lbl">試吃備註</label><textarea id="f-taste-note" placeholder="其他口感描述..." oninput="sf('taste_note',this.value)"></textarea></div></div>`;}

function buildPhotos(c){
  const cats=c?[['pkg','包材/盒子外觀'],['frozen','冷凍狀態白蝦'],['weight','測重畫面'],['thawed','解凍後白蝦'],['cooked','試吃後']]:[['pkg','包材/盒子外觀'],['frozen','冷凍狀態白蝦'],['weight','測重畫面'],['thawed','解凍後白蝦'],['cooked','水煮後']];
  return cats.map(([id,lbl],i)=>`<div class="card"><div class="sh"><div class="sh-badge">${i+1}</div><div class="sh-title">${lbl}</div><div class="photo-count" id="pc-${id}">0 張</div></div><div class="photo-area" id="photos-${id}"></div></div>`).join('');

function switchTab(i,el){
  curTab=i;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const sec=document.getElementById('tab-'+i);if(sec)sec.classList.add('active');
  if(el&&el.classList)el.classList.add('active');else document.querySelectorAll('.tab')[i]?.classList.add('active');
  updateBottomBtn();
  document.querySelectorAll('.tab')[i]?.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
  loadState();
}
function updateBottomBtn(){const nb=document.getElementById('btn-next');nb.textContent=curTab===getTabDefs().length-1?'📊 匯出 Excel':'下一步 →';}
function nextTab(){if(curTab<getTabDefs().length-1)switchTab(curTab+1);else document.getElementById('export-modal').style.display='flex';}
function prevTab(){if(curTab>0)switchTab(curTab-1);}
function closeModal(e){if(!e||e.target===document.getElementById('export-modal'))document.getElementById('export-modal').style.display='none';}

function loadState(){
  const dd=d();
  const sv=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v||'';};
  sv('f-brand',dd.brand);sv('f-po',dd.po);sv('f-date',dd.date);sv('f-spec',dd.spec);
  sv('f-inspector',dd.inspector);sv('f-remark',dd.remark);sv('f-label-note',dd.label_note);
  sv('f-frozen-note',dd.frozen_note);sv('f-frozen-color-note',dd.frozen_color_note);
  sv('f-thawed-note',dd.thawed_note);sv('f-thawed-color-note',dd.thawed_color_note);
  sv('f-cooked-color-note',dd.cooked_color_note);sv('f-taste-note',dd.taste_note);
  const ssl=(rid,rvid,val,def)=>{const r=document.getElementById(rid),rv=document.getElementById(rvid);if(r){r.value=val||def;if(rv)rv.textContent=val||def;}};
  ssl('r-sweet','rv-sweet',dd.taste_sweet,3);ssl('r-shrimp-flavor','rv-shrimp-flavor',dd.taste_shrimp_flavor,3);
  ssl('r-texture','rv-texture',dd.taste_texture_score,3);ssl('r-cooked-color','rv-cooked-color',dd.cooked_color_val,27);
  ssl('r-frozen-color','rv-frozen-color',dd.frozen_color_val,27);ssl('r-thawed-color','rv-thawed-color',dd.thawed_color_val,27);
  const wk={gross:'w-gross',withice:'w-withice',pkg:'w-pkg',net:'w-net',labeled:'w-labeled'};
  for(const[k,id]of Object.entries(wk)){const el=document.getElementById(id);if(el)el.value=dd['w_'+k]||'';}
  const rm={result:'rg-result',pkg_material:'rg-pkg-material',pkg_print:'rg-pkg-print',pkg_color:'rg-pkg-color',pkg_waterproof:'rg-pkg-waterproof',ice:'rg-ice',frozen_size:'rg-frozen-size',arrange:'rg-arrange',ratio_group:'rg-ratio-group',taste_smell:'rg-taste-smell',vein_level:'rg-vein-level'};
  for(const[k,rgid]of Object.entries(rm)){const rg=document.getElementById(rgid);if(!rg)continue;rg.querySelectorAll('.rb').forEach(b=>b.classList.toggle('active',b.textContent.trim()===dd[k]));}
  const cks=['label_content','label_format','label_fontsize','label_law','color_blue','color_green','color_brown','color_yellow','smell_none','smell_sea','smell_fishy','smell_ink','defect_frostbite','defect_blackhead','defect_redhead','defect_blackleg','defect_wsd','th_color_blue','th_color_green','th_color_brown','th_color_yellow','th_smell_none','th_smell_sea','th_smell_fishy','th_smell_ink','th_defect_frostbite','th_defect_blackhead','th_defect_redhead','th_defect_blackleg','th_defect_wsd','vein_shrimp','vein_sand'];
  cks.forEach(k=>{document.querySelectorAll('.ci').forEach(item=>{const oc=item.getAttribute('onclick')||'';if(oc.includes("'"+k+"'")){const cb=item.querySelector('input');if(cb){cb.checked=!!dd[k];item.classList.toggle('on',!!dd[k]);}}});});
  document.querySelectorAll('.type-card').forEach(tc=>{tc.className='type-card'+(tc.id==='tc-raw'&&!isC()?' sel-raw':tc.id==='tc-cooked'&&isC()?' sel-cooked':'');});
  calcW();const n=dd.ratio_group==='五大五小'?5:3;setRatioInputs(n,true);renderPhotos();
}

function calcW(){
  const g=id=>parseFloat(document.getElementById(id)?.value)||0;
  const wi=g('w-withice'),net=g('w-net'),lab=g('w-labeled');
  const icew=wi>0&&net>0?wi-net:null;
  if(document.getElementById('wr-ice'))document.getElementById('wr-ice').textContent=icew!=null?icew.toFixed(1)+'g':'—';
  if(document.getElementById('wr-ice-pct'))document.getElementById('wr-ice-pct').textContent=icew!=null&&wi>0?(icew/wi*100).toFixed(1)+'%':'—';
  const nr=document.getElementById('wr-net-rate');
  if(nr){const rate=lab>0&&net>0?(net/lab*100).toFixed(1)+'%':'—';nr.textContent=rate;if(net>0&&lab>0)nr.className='sv '+(net>=lab*0.95?'pass':'fail');}
  const dd=d();dd.w_gross=g('w-gross')||'';dd.w_withice=wi||'';dd.w_pkg=g('w-pkg')||'';dd.w_net=net||'';dd.w_labeled=lab||'';markDirty();
}
function setRatioInputs(n,restore){
  const dd=d();
  if(!restore){dd.ratio_big=new Array(n).fill('');dd.ratio_small=new Array(n).fill('');}
  else{if(!dd.ratio_big||dd.ratio_big.length!==n)dd.ratio_big=new Array(n).fill('');if(!dd.ratio_small||dd.ratio_small.length!==n)dd.ratio_small=new Array(n).fill('');}
  const cols=Math.min(n,3);
  const mk=(pfx,arr)=>arr.map((_,i)=>`<div><label class="lbl" style="text-align:center;font-size:12px">${pfx}${i+1}</label><input type="number" value="${arr[i]||''}" placeholder="g" inputmode="decimal" style="text-align:center" oninput="updR('${pfx==='大'?'big':'small'}',${i},this.value)"></div>`).join('');
  const bi=document.getElementById('ratio-big-inputs'),si=document.getElementById('ratio-small-inputs');
  if(bi)bi.innerHTML=`<div class="lbl" style="margin-bottom:6px">大規格（${n}隻）</div><div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:6px">${mk('大',dd.ratio_big)}</div>`;
  if(si)si.innerHTML=`<div class="lbl" style="margin-top:10px;margin-bottom:6px">小規格（${n}隻）</div><div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:6px">${mk('小',dd.ratio_small)}</div>`;

}
function updR(t,i,v){const dd=d();(t==='big'?dd.ratio_big:dd.ratio_small)[i]=parseFloat(v)||'';calcRatio();markDirty();}
function calcRatio(){
  const dd=d();
  const bs=(dd.ratio_big||[]).reduce((a,b)=>a+(parseFloat(b)||0),0);
  const ss=(dd.ratio_small||[]).reduce((a,b)=>a+(parseFloat(b)||0),0);
  const ratio=ss>0?(bs/ss).toFixed(2):null;
  if(document.getElementById('ratio-big-sum'))document.getElementById('ratio-big-sum').textContent=bs>0?bs.toFixed(1)+'g':'—';
  if(document.getElementById('ratio-small-sum'))document.getElementById('ratio-small-sum').textContent=ss>0?ss.toFixed(1)+'g':'—';
  const el=document.getElementById('ratio-result');
  if(el){el.textContent=ratio||'—';el.className='sv'+(ratio?' '+(parseFloat(ratio)<=1.2?'pass':'fail'):'');}
}
const pCats=['pkg','frozen','weight','thawed','cooked'];
function renderPhotos(){
  const dd=d();if(!dd.photos)dd.photos={};
  pCats.forEach(cat=>{
    const container=document.getElementById('photos-'+cat);if(!container)return;
    if(!dd.photos[cat])dd.photos[cat]=[];
    const cnt=document.getElementById('pc-'+cat);if(cnt)cnt.textContent=dd.photos[cat].length+'張';
    container.innerHTML='';
    dd.photos[cat].forEach((src,i)=>{
      if(!src)return;
      const slot=document.createElement('div');slot.className='pslot';
      const img=document.createElement('img');img.src=src;slot.appendChild(img);
      const btn=document.createElement('button');btn.className='del-btn';btn.textContent='✕';
      btn.onclick=e=>{e.stopPropagation();dd.photos[cat].splice(i,1);markDirty();renderPhotos();};
      slot.appendChild(btn);container.appendChild(slot);
    });
    const add=document.createElement('div');add.className='pslot';
    add.innerHTML='<span class="pi">📷</span><span class="pl">拍照上傳</span>';
    const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.capture='environment';
    inp.onchange=e=>{const f=e.target.files[0];if(!f)return;
      // Resize before storing
      const img=new Image();img.onload=()=>{
        const MAX=400;let w=img.width,h=img.height;
        if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
        const cv=document.createElement('canvas');cv.width=w;cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        const resized=cv.toDataURL('image/jpeg',0.5);
        dd.photos[cat].push(resized);markDirty();renderPhotos();
      };img.src=URL.createObjectURL(f);
    };
    add.appendChild(inp);add.onclick=()=>inp.click();container.appendChild(add);
  });
}

function setProgress(pct,txt){

// Resize a dataURL via canvas → jpeg at quality 0.7, max 800px
function resizeDataURL(dataURL,maxPx,quality){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxPx||h>maxPx){if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}else{w=Math.round(w*maxPx/h);h=maxPx;}}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      res(cv.toDataURL('image/jpeg',quality||0.72));
    };
    img.src=dataURL;
  });
}
function dataURLtoBuffer(dataURL){
  const b=atob(dataURL.split(',')[1]);const buf=new Uint8Array(b.length);
  for(let i=0;i<b.length;i++)buf[i]=b.charCodeAt(i);return buf.buffer;
}

 async function doExport(withPhotos){

function dataURLtoBuffer(dataURL){
  const parts=dataURL.split(',');
  const byteString=atob(parts[1]);
  const ab=new ArrayBuffer(byteString.length);
  const ia=new Uint8Array(ab);
  for(let i=0;i<byteString.length;i++){
    ia[i]=byteString.charCodeAt(i);
  }
  return ab;
}
